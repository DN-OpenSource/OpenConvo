name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: openstream
          POSTGRES_PASSWORD: openstream
          POSTGRES_DB: openstream_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openstream"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test -race -count=1 ./...
      - name: Integration tests
        env:
          OPENSTREAM_TEST_POSTGRES_DSN: postgres://openstream:openstream@localhost:5432/openstream_test?sslmode=disable
        run: go test -race -count=1 -tags=integration ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./cmd/openstream
