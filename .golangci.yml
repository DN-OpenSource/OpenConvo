version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
    - nilerr
    - errorlint
    - bodyclose
    - noctx
  settings:
    gosec:
      excludes:
        - G404 # math/rand acceptable for jitter/backoff
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx
          - bodyclose
          - unparam
      # The default Postgres DSN carries the well-known local dev
      # credentials from docker-compose.dev.yml; it is not a real secret.
      - path: internal/config/config\.go
        text: "Password in URL"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
